name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to publish (e.g. v0.1.0)'
        required: true

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for creating the Release
    steps:
      - uses: actions/checkout@v4

      - name: ESP-IDF build (esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          path: '.'

      # Single-file flash image (bootloader + partition + app pre-merged)
      # so end users can `esptool.py write_flash 0x0 moshon_timetable-full.bin`
      # in one shot.
      - name: Install esptool
        run: pip install esptool

      # esp-idf-ci-action runs inside docker and leaves build/ owned by
      # root, so the runner user can't write into it. Take ownership back
      # before merging firmware images.
      - name: Take ownership of build dir
        run: sudo chown -R $USER:$USER build

      # OTA partition layout (see firmware/partitions.csv):
      #   0x0000   bootloader
      #   0x8000   partition table
      #   0xF000   otadata (NEW — required for esp_https_ota)
      #   0x20000  ota_0 (initial app slot)
      #   0x220000 ota_1 (alternate slot, blank at factory flash)
      #
      # We only ship ota_0 in the merged image; the bootloader populates
      # otadata on first boot. After a successful esp_https_ota run the
      # device flips otadata to point at ota_1 (or back).
      - name: Merge firmware images (single-file flash)
        working-directory: build
        run: |
          esptool.py --chip esp32s3 merge-bin \
            -o moshon_timetable-full.bin \
            --flash-mode dio --flash-freq 80m --flash-size 16MB \
            0x0      bootloader/bootloader.bin \
            0x8000   partition_table/partition-table.bin \
            0x20000  moshon_timetable.bin
          ls -lh moshon_timetable-full.bin moshon_timetable.bin

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/moshon_timetable.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flash_args
            build/moshon_timetable-full.bin
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
