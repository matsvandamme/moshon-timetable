name: Refresh Belgian stations list

# Runs on the first day of every month, re-runs scripts/gen_stations.py
# against the live iRail catalogue, and opens a PR if the generated
# stations_be.* files actually changed. Keeps the bundled station list in
# sync with NMBS additions / renames without anyone having to remember.
#
# Also wired to workflow_dispatch so a maintainer can trigger an on-demand
# refresh from the Actions tab when iRail announces changes mid-month.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC, 1st of each month
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Regenerate stations_be.c / stations_be.h
        run: python scripts/gen_stations.py

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(stations): refresh Belgian stations list from iRail"
          title: "chore(stations): refresh Belgian stations list from iRail"
          body: |
            Monthly auto-refresh of the bundled NMBS / SNCB stations list.

            Generated by `scripts/gen_stations.py` against
            `https://api.irail.be/v1/stations/?format=json&lang=nl`.

            Merge if the diff looks sensible (new stations added, none
            disappeared). Reject if iRail returned a degraded snapshot.
          branch: chore/stations-refresh
          delete-branch: true
