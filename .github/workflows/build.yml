name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ESP-IDF v5.3.2 (esp32s3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # wifi_secrets.h is gitignored. CI doesn't need real creds — it just
      # needs the file to exist with compile-time defines so wifi.c builds.
      - name: Provision placeholder wifi_secrets.h
        run: cp main/wifi_secrets.h.example main/wifi_secrets.h

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          path: '.'

      - name: Report sizes
        run: |
          ls -lh build/moshon_timetable.bin build/bootloader/bootloader.bin || true
          echo "---"
          du -sh build/managed_components 2>/dev/null || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moshon-timetable-firmware
          path: |
            build/moshon_timetable.bin
            build/moshon_timetable.elf
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flash_args
          retention-days: 30
          if-no-files-found: warn
